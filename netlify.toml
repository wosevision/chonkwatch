[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  framework = "vite"
  targetPort = 5173

# All other routes fall through to the SPA. The `/api/csvs` function declares
# its own `path` via the v2 function config, so we don't need an explicit
# rewrite for it here.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
